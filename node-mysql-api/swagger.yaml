openapi: 3.0.0
info:
  title: Node MySQL API
  version: 1.0.0
servers:
  - url: http://localhost:4000
tags:
  - name: Accounts
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuthenticateRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
    RegisterRequest:
      type: object
      required: [title, firstName, lastName, email, password, confirmPassword, acceptTerms]
      properties:
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        confirmPassword:
          type: string
        acceptTerms:
          type: boolean
    TokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    ResetPasswordRequest:
      type: object
      required: [token, password, confirmPassword]
      properties:
        token:
          type: string
        password:
          type: string
          minLength: 6
        confirmPassword:
          type: string
    AccountResponse:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
        created:
          type: string
          format: date-time
        updated:
          type: string
          format: date-time
          nullable: true
        isVerified:
          type: boolean
        jwtToken:
          type: string
paths:
  /accounts/authenticate:
    post:
      tags: [Accounts]
      summary: Authenticate account credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
      responses:
        '200':
          description: Authenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AccountResponse'
                  - type: object
                    properties:
                      refreshToken:
                        type: string
        '400':
          description: Bad request
  /accounts/refresh-token:
    post:
      tags: [Accounts]
      summary: Refresh access token using refresh token cookie
      responses:
        '200':
          description: Refreshed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/AccountResponse'
                  - type: object
                    properties:
                      refreshToken:
                        type: string
        '400':
          description: Bad request
  /accounts/revoke-token:
    post:
      tags: [Accounts]
      summary: Revoke a refresh token
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token revoked
        '401':
          description: Unauthorized
  /accounts/register:
    post:
      tags: [Accounts]
      summary: Register a new account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
        '400':
          description: Validation error
  /accounts/verify-email:
    post:
      tags: [Accounts]
      summary: Verify a new account using verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Verified
        '400':
          description: Invalid token
  /accounts/forgot-password:
    post:
      tags: [Accounts]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Sent (or no-op if email not found)
        '400':
          description: Validation error
  /accounts/validate-reset-token:
    post:
      tags: [Accounts]
      summary: Validate a password reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        '200':
          description: Token is valid
        '400':
          description: Invalid token
  /accounts/reset-password:
    post:
      tags: [Accounts]
      summary: Reset password using reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
        '400':
          description: Validation error
  /accounts:
    get:
      tags: [Accounts]
      summary: Get all accounts (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized
    post:
      tags: [Accounts]
      summary: Create an account (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized
  /accounts/{id}:
    get:
      tags: [Accounts]
      summary: Get account by id
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      tags: [Accounts]
      summary: Update account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '401':
          description: Unauthorized
    delete:
      tags: [Accounts]
      summary: Delete account
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Deleted
        '401':
          description: Unauthorized
